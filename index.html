<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wordly Dictionary</title>
</head>
<body>
    <h1>Dictionary Web Application</h1>

    <form id="search-word">
        <label for="Word-search">Word:</label>
        <input type="text" id="Word-search" placeholder="Type an English word....">
        <button type="submit">Search</button> 

    </form>

    <div id="toDisplay">
        <h2 id="nameSearched"></h2>
        <h2 id="namePronunciation"></h2>
        <h2 id="nameDefinition"></h2>
        <h2 id="nameSynoname"></h2>
    </div>
    <script src="script.js"></script>
</body>
</html>
